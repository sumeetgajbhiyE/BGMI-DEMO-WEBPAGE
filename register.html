<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BGMI | Register</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <style>
        :root {
            --text-color: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.7);
            --bg-color: #050505;
            --card-bg: rgba(255, 255, 255, 0.05);
            --accent-color: #00ff66;
            --accent-glow: 0 0 15px rgba(0, 255, 102, 0.5);
            --border-color: rgba(255, 255, 255, 0.15);
            --danger-color: #ff4d4d;
        }
        * { box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body {
            margin: 0; padding: 40px 0; min-height: 100vh;
            color: var(--text-color);
            background-color: var(--bg-color);
            display: flex; justify-content: center; align-items: center;
        }
        .video-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: -2; transform: scale(1.05);
        }
        .video-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.65); z-index: -1; backdrop-filter: blur(8px);
        }
        .glass-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 20px;
            padding: 50px 40px;
            width: 90%;
            max-width: 480px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.4);
            position: relative;
            z-index: 1;
            animation: floatUp 0.8s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
            opacity: 0; transform: translateY(30px);
        }
        @keyframes floatUp { to { opacity: 1; transform: translateY(0); } }
        .glass-card::before {
            content: ''; position: absolute; top: -50px; right: -50px;
            width: 150px; height: 150px;
            background: var(--accent-color);
            border-radius: 50%; filter: blur(80px);
            opacity: 0.3; z-index: -1; pointer-events: none;
        }
        h1 {
            font-size: 2.3rem; font-weight: 800; text-align: center;
            margin-bottom: 5px;
            background: linear-gradient(to right, #fff, var(--text-muted));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-transform: uppercase; letter-spacing: 2px;
        }
        .subtitle { text-align: center; color: var(--text-muted); margin-bottom: 28px; font-weight: 300; }
        .form-label { font-weight: 600; color: var(--text-color); margin-bottom: 8px; letter-spacing: 0.5px; }
        .form-control {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            border-radius: 8px; padding: 12px 15px; font-size: 1rem;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--accent-color);
            box-shadow: 0 0 10px rgba(0, 255, 102, 0.3);
            color: var(--text-color); outline: none;
        }
        .form-control::placeholder { color: rgba(255, 255, 255, 0.4); }
        .btn-custom {
            width: 100%; padding: 12px; border-radius: 8px;
            font-weight: 800; font-size: 1rem;
            text-transform: uppercase; letter-spacing: 1px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            margin-top: 10px;
        }
        .btn-submit {
            background: linear-gradient(135deg, var(--accent-color), #00b347);
            color: #000; border: none;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        .btn-submit:hover { transform: translateY(-3px); box-shadow: var(--accent-glow); color: #111; }
        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .btn-ghost {
            background: transparent; color: var(--text-color);
            border: 1px solid var(--border-color); margin-top: 15px;
        }
        .btn-ghost:hover { background: rgba(255, 255, 255, 0.1); border-color: var(--text-color); }
        .back-link {
            position: absolute; top: 30px; left: 40px;
            color: var(--text-color); text-decoration: none;
            font-weight: 600; display: flex; align-items: center; gap: 8px;
            transition: all 0.3s ease; z-index: 10;
        }
        .back-link:hover { color: var(--accent-color); transform: translateX(-5px); }
        .form-message {
            margin-top: 16px; padding: 10px 14px; border-radius: 8px;
            font-size: 0.9rem; display: none;
        }
        .form-message.error {
            display: block;
            background: rgba(255, 77, 77, 0.12);
            border: 1px solid rgba(255, 77, 77, 0.4);
            color: var(--danger-color);
        }
        .form-message.success {
            display: block;
            background: rgba(0, 255, 102, 0.12);
            border: 1px solid rgba(0, 255, 102, 0.4);
            color: var(--accent-color);
        }
        @media (max-width: 576px) {
            .glass-card { padding: 40px 25px; width: 95%; }
            .back-link { top: 20px; left: 20px; }
        }
    </style>
</head>
<body>
    <video class="video-bg" autoplay muted loop playsinline>
        <source src="https://www.shutterstock.com/shutterstock/videos/1044897340/preview/stock-footage-moscow-russia-december-girl-holding-a-smart-phone-iphone-pro-playing-online-mobile.mp4" type="video/mp4">
    </video>
    <div class="video-overlay"></div>

    <a href="index.html" class="back-link">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Back to Home
    </a>

    <div class="glass-card">
        <h1>Register</h1>
        <p class="subtitle">Create your BGMI Account</p>

        <form id="registerForm" novalidate>
            <div class="mb-3">
                <label for="fullName" class="form-label">Full Name</label>
                <input type="text" class="form-control" id="fullName" name="fullName" placeholder="Enter your full name" required>
            </div>

            <div class="mb-3">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" class="form-control" id="email" name="email" placeholder="Enter your email" required>
            </div>

            <div class="mb-3">
                <label for="phone" class="form-label">Phone Number</label>
                <input type="tel" class="form-control" id="phone" name="phone" placeholder="e.g. +91 98765 43210" required>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" name="password" placeholder="Minimum 6 characters" minlength="6" required>
            </div>

            <button type="submit" class="btn-custom btn-submit" id="registerBtn">Create Account</button>
            <a href="login.html" class="btn-custom btn-ghost d-block text-center text-decoration-none">Already have an account? Login</a>

            <div id="formMessage" class="form-message" role="status" aria-live="polite"></div>
        </form>
    </div>

    <script type="module">
        import { supabase } from "./js/supabase-client.js";

        const form = document.getElementById("registerForm");
        const btn = document.getElementById("registerBtn");
        const messageEl = document.getElementById("formMessage");

        function showMessage(text, type) {
            messageEl.textContent = text;
            messageEl.className = "form-message " + type;
        }

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            messageEl.className = "form-message";
            messageEl.textContent = "";

            const fullName = document.getElementById("fullName").value.trim();
            const email = document.getElementById("email").value.trim();
            const phone = document.getElementById("phone").value.trim();
            const password = document.getElementById("password").value;

            if (!fullName || !email || !phone || !password) {
                showMessage("Please fill in all fields.", "error");
                return;
            }

            btn.disabled = true;
            btn.textContent = "Creating Account...";

            try {
                const { data, error } = await supabase.auth.signUp({
                    email,
                    password,
                    options: {
                        data: { full_name: fullName, phone },
                        emailRedirectTo: window.location.origin + "/profile.html",
                    },
                });

                if (error) {
                    showMessage(error.message, "error");
                    return;
                }

                if (data.session) {
                    showMessage("Account created! Redirecting...", "success");
                    setTimeout(() => { window.location.href = "profile.html"; }, 800);
                } else {
                    showMessage(
                        "Account created. Please check your email to confirm your address, then login.",
                        "success"
                    );
                    form.reset();
                }
            } catch (err) {
                showMessage("Something went wrong. Please try again.", "error");
            } finally {
                btn.disabled = false;
                btn.textContent = "Create Account";
            }
        });
    </script>
</body>
</html>
