<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BGMI | Profile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <style>
        :root {
            --text-color: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.7);
            --bg-color: #050505;
            --card-bg: rgba(255, 255, 255, 0.05);
            --accent-color: #00ff66;
            --accent-glow: 0 0 15px rgba(0, 255, 102, 0.5);
            --border-color: rgba(255, 255, 255, 0.15);
        }
        * { box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body {
            margin: 0; padding: 40px 0; min-height: 100vh;
            color: var(--text-color);
            background-color: var(--bg-color);
            display: flex; justify-content: center; align-items: center;
        }
        .video-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: -2; transform: scale(1.05);
        }
        .video-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.65); z-index: -1; backdrop-filter: blur(8px);
        }
        .glass-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 20px;
            padding: 50px 40px;
            width: 90%;
            max-width: 520px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.4);
            position: relative;
            z-index: 1;
        }
        .glass-card::before {
            content: ''; position: absolute; top: -50px; right: -50px;
            width: 150px; height: 150px;
            background: var(--accent-color);
            border-radius: 50%; filter: blur(80px);
            opacity: 0.3; z-index: -1; pointer-events: none;
        }
        h1 {
            font-size: 2.3rem; font-weight: 800; text-align: center;
            margin-bottom: 5px;
            background: linear-gradient(to right, #fff, var(--text-muted));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-transform: uppercase; letter-spacing: 2px;
        }
        .subtitle { text-align: center; color: var(--text-muted); margin-bottom: 28px; font-weight: 300; }
        .detail-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid var(--border-color);
        }
        .detail-row:last-of-type { border-bottom: none; }
        .detail-label { color: var(--text-muted); font-weight: 300; letter-spacing: 0.5px; }
        .detail-value { font-weight: 600; word-break: break-all; text-align: right; }
        .btn-custom {
            width: 100%; padding: 12px; border-radius: 8px;
            font-weight: 800; font-size: 1rem;
            text-transform: uppercase; letter-spacing: 1px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            margin-top: 20px;
        }
        .btn-submit {
            background: linear-gradient(135deg, var(--accent-color), #00b347);
            color: #000; border: none;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        .btn-submit:hover { transform: translateY(-3px); box-shadow: var(--accent-glow); color: #111; }
        .btn-ghost {
            background: transparent; color: var(--text-color);
            border: 1px solid var(--border-color); margin-top: 10px;
        }
        .btn-ghost:hover { background: rgba(255, 255, 255, 0.1); border-color: var(--text-color); }
        .loading, .error {
            text-align: center; padding: 20px; color: var(--text-muted);
        }
    </style>
</head>
<body>
    <video class="video-bg" autoplay muted loop playsinline>
        <source src="https://www.shutterstock.com/shutterstock/videos/1044897340/preview/stock-footage-moscow-russia-december-girl-holding-a-smart-phone-iphone-pro-playing-online-mobile.mp4" type="video/mp4">
    </video>
    <div class="video-overlay"></div>

    <div class="glass-card">
        <h1>Profile</h1>
        <p class="subtitle">Your BGMI Account Details</p>

        <div id="profileContent" class="loading">Loading your profile...</div>

        <button type="button" id="logoutBtn" class="btn-custom btn-submit" style="display:none;">Logout</button>
        <a href="index.html" class="btn-custom btn-ghost d-block text-center text-decoration-none">Back to Home</a>
    </div>

    <script type="module">
        import { supabase } from "./js/supabase-client.js";

        const contentEl = document.getElementById("profileContent");
        const logoutBtn = document.getElementById("logoutBtn");

        function escapeHtml(str) {
            return String(str ?? "").replace(/[&<>"']/g, (c) => ({
                "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
            }[c]));
        }

        async function loadProfile() {
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) {
                window.location.href = "login.html";
                return;
            }

            const { data: profile, error } = await supabase
                .from("profiles")
                .select("email, full_name, phone, created_at")
                .eq("id", user.id)
                .single();

            if (error || !profile) {
                contentEl.className = "error";
                contentEl.textContent = "Could not load profile details.";
                logoutBtn.style.display = "block";
                return;
            }

            const created = new Date(profile.created_at).toLocaleString();

            contentEl.className = "";
            contentEl.innerHTML = `
                <div class="detail-row">
                    <span class="detail-label">Full Name</span>
                    <span class="detail-value">${escapeHtml(profile.full_name || "-")}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Email</span>
                    <span class="detail-value">${escapeHtml(profile.email)}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Phone</span>
                    <span class="detail-value">${escapeHtml(profile.phone || "-")}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Member Since</span>
                    <span class="detail-value">${escapeHtml(created)}</span>
                </div>
            `;
            logoutBtn.style.display = "block";
        }

        logoutBtn.addEventListener("click", async () => {
            await supabase.auth.signOut();
            window.location.href = "login.html";
        });

        loadProfile();
    </script>
</body>
</html>
